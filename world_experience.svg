<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <style>
      .ocean { fill: #0b1220; }
      .land { fill: #1f2a44; stroke: #2f3b5c; stroke-width: 1; }
      .grid { stroke: #22304f; stroke-width: 1; opacity: 0.45; }
      .pin  { fill: #ffffff; stroke: #0b1220; stroke-width: 2; }
      .label { fill: #e6e9f2; font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 600; }
      .sub   { fill: #aab3c7; font-family: Inter, Arial, sans-serif; font-size: 14px; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="ocean" x="0" y="0" width="1200" height="560" rx="24"/>

  <!-- Light grid -->
  <g>
    <line class="grid" x1="100" y1="80" x2="1100" y2="80"/>
    <line class="grid" x1="100" y1="160" x2="1100" y2="160"/>
    <line class="grid" x1="100" y1="240" x2="1100" y2="240"/>
    <line class="grid" x1="100" y1="320" x2="1100" y2="320"/>
    <line class="grid" x1="100" y1="400" x2="1100" y2="400"/>
    <line class="grid" x1="100" y1="480" x2="1100" y2="480"/>

    <line class="grid" x1="100" y1="80" x2="100"  y2="480"/>
    <line class="grid" x1="300" y1="80" x2="300"  y2="480"/>
    <line class="grid" x1="500" y1="80" x2="500"  y2="480"/>
    <line class="grid" x1="700" y1="80" x2="700"  y2="480"/>
    <line class="grid" x1="900" y1="80" x2="900"  y2="480"/>
    <line class="grid" x1="1100" y1="80" x2="1100" y2="480"/>
  </g>

  <!-- Simplified continents (stylized but clearly a world map) -->
  <!-- North America -->
  <path class="land" d="M210,140 C250,110 320,100 380,130 C420,150 445,190 430,225 C415,262 360,270 330,290 C290,320 260,330 235,312 C210,295 195,250 185,215 C175,185 180,160 210,140 Z"/>
  <!-- South America -->
  <path class="land" d="M360,285 C395,280 425,295 435,330 C445,365 435,405 415,440 C395,475 370,485 350,465 C330,445 335,415 330,380 C325,345 330,295 360,285 Z"/>
  <!-- Europe -->
  <path class="land" d="M595,150 C625,130 670,130 695,150 C715,165 710,190 685,200 C655,212 620,210 600,195 C580,180 575,165 595,150 Z"/>
  <!-- Africa -->
  <path class="land" d="M650,215 C690,215 730,240 740,285 C750,330 730,385 690,425 C650,465 610,445 595,410 C580,375 595,330 605,295 C615,260 625,215 650,215 Z"/>
  <!-- Asia -->
  <path class="land" d="M715,150 C770,115 860,110 935,140 C995,165 1035,220 1010,265 C985,310 920,310 880,335 C840,360 780,360 750,335 C720,310 710,270 700,230 C690,195 690,170 715,150 Z"/>
  <!-- Australia -->
  <path class="land" d="M930,380 C965,360 1015,365 1045,395 C1070,420 1060,455 1030,470 C995,488 950,480 930,455 C910,430 905,400 930,380 Z"/>

  <!-- Title -->
  <text class="label" x="80" y="52">International Experience Map</text>
  <text class="sub" x="80" y="72">Lima • Athens (OH) • Madrid</text>

  <!-- Pin positioning uses a simple equirectangular projection on the map area:
       Map area is x=[100..1100], y=[80..480], width=1000, height=400
       x = 100 + (lon + 180)/360 * 1000
       y = 80 + (90 - lat)/180 * 400
  -->

  <!-- Lima, Peru (lat -12.0464, lon -77.0428) -->
  <circle class="pin" cx="386" cy="307" r="8"/>
  <text class="label" x="405" y="312">Lima</text>
  <text class="sub" x="405" y="332">Peru</text>

  <!-- Athens, Ohio, USA (lat 39.3292, lon -82.1013) -->
  <circle class="pin" cx="372" cy="193" r="8"/>
  <text class="label" x="392" y="198">Athens</text>
  <text class="sub" x="392" y="218">USA (OH)</text>

  <!-- Madrid, Spain (lat 40.4168, lon -3.7038) -->
  <circle class="pin" cx="690" cy="190" r="8"/>
  <text class="label" x="710" y="195">Madrid</text>
  <text class="sub" x="710" y="215">Spain</text>
</svg>
