<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .card { fill: #0e1730; opacity: 0.95; }
      .grid { stroke: #22304f; stroke-width: 1; opacity: 0.35; }
      .coast { fill: #1f2a44; stroke: #334061; stroke-width: 1.2; }
      .title { fill: #e6e9f2; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Arial; font-size: 22px; font-weight: 800; }
      .subtitle { fill: #aab3c7; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Arial; font-size: 14px; font-weight: 600; }
      .label { fill: #e6e9f2; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Arial; font-size: 18px; font-weight: 800; }
      .sub { fill: #aab3c7; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Arial; font-size: 13px; font-weight: 700; }
      .pinOuter { fill: #ffffff; opacity: 0.18; }
      .pin { fill: #ffffff; stroke: #0b1220; stroke-width: 2.5; }
      .pinRing { fill: none; stroke: #ffffff; stroke-width: 2; opacity: 0.35; }
    </style>

    <!-- Soft vignette -->
    <radialGradient id="vignette" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#0f1c3a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1400" height="620" rx="26"/>
  <rect x="0" y="0" width="1400" height="620" rx="26" fill="url(#vignette)"/>

  <!-- Card area -->
  <rect class="card" x="80" y="85" width="1240" height="470" rx="26"/>

  <!-- Title -->
  <text class="title" x="140" y="140">International Experience Map</text>
  <text class="subtitle" x="140" y="162">Lima • Athens (OH) • Madrid</text>

  <!-- Map frame -->
  <clipPath id="mapClip">
    <rect x="140" y="185" width="1120" height="330" rx="16"/>
  </clipPath>

  <g clip-path="url(#mapClip)">
    <rect x="140" y="185" width="1120" height="330" fill="#0b1429"/>

    <!-- Grid (simple graticule look) -->
    <g>
      <!-- horizontal -->
      <line class="grid" x1="140" y1="235" x2="1260" y2="235"/>
      <line class="grid" x1="140" y1="285" x2="1260" y2="285"/>
      <line class="grid" x1="140" y1="335" x2="1260" y2="335"/>
      <line class="grid" x1="140" y1="385" x2="1260" y2="385"/>
      <line class="grid" x1="140" y1="435" x2="1260" y2="435"/>

      <!-- vertical -->
      <line class="grid" x1="220" y1="185" x2="220" y2="515"/>
      <line class="grid" x1="340" y1="185" x2="340" y2="515"/>
      <line class="grid" x1="460" y1="185" x2="460" y2="515"/>
      <line class="grid" x1="580" y1="185" x2="580" y2="515"/>
      <line class="grid" x1="700" y1="185" x2="700" y2="515"/>
      <line class="grid" x1="820" y1="185" x2="820" y2="515"/>
      <line class="grid" x1="940" y1="185" x2="940" y2="515"/>
      <line class="grid" x1="1060" y1="185" x2="1060" y2="515"/>
      <line class="grid" x1="1180" y1="185" x2="1180" y2="515"/>
    </g>

    <!-- CONTINENTS (stylized but recognizable silhouettes) -->
    <!-- North America -->
    <path class="coast" d="
      M260,255
      C285,225 340,210 385,220
      C420,228 450,250 462,275
      C470,294 462,318 440,330
      C420,342 405,350 392,362
      C365,388 328,392 300,372
      C270,350 252,315 246,290
      C240,270 244,265 260,255
      Z
      M430,248
      C448,236 470,238 486,250
      C500,262 496,280 478,286
      C456,294 438,272 430,248 Z
    "/>

    <!-- Central America / Caribbean hint -->
    <path class="coast" d="M455,345 C468,340 490,342 504,350 C514,356 508,368 494,370 C476,374 462,362 455,345 Z"/>

    <!-- South America -->
    <path class="coast" d="
      M455,372
      C480,365 505,372 520,395
      C536,420 534,455 520,488
      C506,520 478,532 458,520
      C438,508 438,484 442,460
      C448,424 430,385 455,372
      Z
    "/>

    <!-- Europe -->
    <path class="coast" d="
      M690,235
      C715,220 748,220 770,232
      C790,243 786,262 764,270
      C738,280 708,275 690,262
      C675,252 675,244 690,235 Z
    "/>

    <!-- Africa -->
    <path class="coast" d="
      M740,280
      C772,275 805,290 822,318
      C842,350 842,395 820,435
      C800,470 770,480 748,462
      C724,444 718,410 724,380
      C730,350 720,292 740,280 Z
    "/>

    <!-- Middle East / India -->
    <path class="coast" d="M820,300 C846,292 870,305 884,324 C898,346 888,370 862,374 C836,378 820,354 820,300 Z"/>

    <!-- Asia -->
    <path class="coast" d="
      M820,240
      C875,210 960,210 1030,240
      C1090,266 1120,310 1100,342
      C1078,378 1015,372 980,388
      C935,410 880,408 850,388
      C822,368 808,332 802,300
      C796,268 800,254 820,240 Z
      M1035,255
      C1068,252 1090,272 1098,292
      C1106,314 1088,328 1060,324
      C1032,320 1018,276 1035,255 Z
    "/>

    <!-- Japan / Korea hint -->
    <path class="coast" d="M1088,305 C1098,296 1110,302 1112,314 C1114,326 1100,332 1092,324 C1086,318 1084,312 1088,305 Z"/>

    <!-- Australia -->
    <path class="coast" d="
      M1045,445
      C1080,430 1125,438 1148,465
      C1170,492 1155,520 1122,528
      C1088,536 1052,520 1040,492
      C1030,468 1028,456 1045,445 Z
    "/>

    <!-- Greenland hint -->
    <path class="coast" d="M440,205 C468,190 505,192 520,212 C534,232 520,252 490,250 C462,248 440,228 440,205 Z"/>

    <!-- Pins (using a simple equirectangular projection mapped to this frame) -->
    <!-- Map frame: x=[140..1260] width=1120 ; y=[185..515] height=330 -->
    <!-- x = 140 + (lon+180)/360 * 1120 -->
    <!-- y = 185 + (90-lat)/180 * 330 -->

    <!-- Athens, OH (39.3292, -82.1013) -->
    <circle class="pinOuter" cx="444" cy="277" r="18"/>
    <circle class="pinRing"  cx="444" cy="277" r="14"/>
    <circle class="pin"      cx="444" cy="277" r="8"/>
    <text class="label" x="468" y="282">Athens</text>
    <text class="sub"   x="468" y="302">USA (OH)</text>

    <!-- Lima (-12.0464, -77.0428) -->
    <circle class="pinOuter" cx="461" cy="389" r="18"/>
    <circle class="pinRing"  cx="461" cy="389" r="14"/>
    <circle class="pin"      cx="461" cy="389" r="8"/>
    <text class="label" x="485" y="394">Lima</text>
    <text class="sub"   x="485" y="414">Peru</text>

    <!-- Madrid (40.4168, -3.7038) -->
    <circle class="pinOuter" cx="688" cy="275" r="18"/>
    <circle class="pinRing"  cx="688" cy="275" r="14"/>
    <circle class="pin"      cx="688" cy="275" r="8"/>
    <text class="label" x="712" y="280">Madrid</text>
    <text class="sub"   x="712" y="300">Spain</text>

  </g>

  <!-- Map frame stroke -->
  <rect x="140" y="185" width="1120" height="330" rx="16" fill="none" stroke="#22304f" stroke-width="1.2" opacity="0.8"/>
</svg>
