<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .card { fill: #0e1730; }
      .grid { stroke: #22304f; stroke-width: 1; opacity: 0.3; }
      .continent { fill: #253454; stroke: #334061; stroke-width: 0.5; }
      .title { fill: #e6e9f2; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 24px; font-weight: 800; }
      .subtitle { fill: #aab3c7; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; }
      .label { fill: #ffffff; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 700; }
      .sub-label { fill: #aab3c7; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 600; }
      .pin-glow { fill: #ffffff; filter: url(#glow); opacity: 0.4; }
      .pin-core { fill: #ffffff; stroke: #0b1220; stroke-width: 2; }
    </style>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <clipPath id="mapClip">
      <rect x="140" y="185" width="1120" height="330" rx="12"/>
    </clipPath>
  </defs>

  <rect class="bg" width="1400" height="620" rx="24"/>
  
  <rect class="card" x="80" y="85" width="1240" height="470" rx="24"/>

  <text class="title" x="140" y="140">International Experience Map</text>
  <text class="subtitle" x="140" y="165">Lima • Athens (OH) • Madrid</text>

  <g clip-path="url(#mapClip)">
    <rect x="140" y="185" width="1120" height="330" fill="#0d152a"/>

    <g class="grid">
      <line x1="140" y1="240" x2="1260" y2="240" />
      <line x1="140" y1="295" x2="1260" y2="295" />
      <line x1="140" y1="350" x2="1260" y2="350" />
      <line x1="140" y1="405" x2="1260" y2="405" />
      <line x1="140" y1="460" x2="1260" y2="460" />
      <line x1="280" y1="185" x2="280" y2="515" />
      <line x1="420" y1="185" x2="420" y2="515" />
      <line x1="560" y1="185" x2="560" y2="515" />
      <line x1="700" y1="185" x2="700" y2="515" />
      <line x1="840" y1="185" x2="840" y2="515" />
      <line x1="980" y1="185" x2="980" y2="515" />
      <line x1="1120" y1="185" x2="1120" y2="515" />
    </g>

    <g class="continent">
      <path d="M410,210 L445,200 L490,205 L510,240 L490,265 L460,280 L445,310 L435,340 L415,345 L415,315 L380,310 L340,300 L300,310 L260,290 L240,240 L280,215 L330,225 L380,215 Z" />
      <path d="M510,200 L550,195 L565,215 L530,235 L505,220 Z" />
      <path d="M435,350 L460,345 L500,360 L520,385 L535,420 L510,480 L485,510 L465,510 L445,460 L440,400 L425,370 Z" />
      <path d="M680,225 L720,220 L750,210 L800,210 L900,200 L1050,210 L1150,230 L1180,280 L1150,330 L1100,360 L1000,380 L900,385 L850,380 L800,340 L750,320 L730,280 L700,280 L675,260 Z" />
      <path d="M690,290 L740,285 L800,300 L840,330 L845,380 L825,440 L790,480 L760,480 L720,440 L700,380 L680,340 Z" />
      <path d="M1020,440 L1100,435 L1140,460 L1140,490 L1100,510 L1040,500 L1010,470 Z" />
      <path d="M675,235 L690,230 L695,245 L680,250 Z" />
      <path d="M1160,280 L1175,275 L1185,310 L1170,320 Z" />
    </g>

    <g transform="translate(444, 278)">
      <circle class="pin-glow" r="14" />
      <circle class="pin-core" r="5" />
      <text class="label" x="12" y="4">Athens</text>
      <text class="sub-label" x="12" y="20">USA (OH)</text>
    </g>

    <g transform="translate(688, 276)">
      <circle class="pin-glow" r="14" />
      <circle class="pin-core" r="5" />
      <text class="label" x="12" y="4">Madrid</text>
      <text class="sub-label" x="12" y="20">Spain</text>
    </g>

    <g transform="translate(460, 372)">
      <circle class="pin-glow" r="14" />
      <circle class="pin-core" r="5" />
      <text class="label" x="12" y="4">Lima</text>
      <text class="sub-label" x="12" y="20">Peru</text>
    </g>

  </g>

  <rect x="140" y="185" width="1120" height="330" rx="12" fill="none" stroke="#334061" stroke-width="1.5" opacity="0.5"/>
</svg>
